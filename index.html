<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    line-height: 1.8; margin: 0; padding: 0;

  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.06); }
  .card h2 { margin: 0 0 4px; font-size: 1.15rem; }
  .card p { margin: 0; color: #6b6b70; font-size: .9rem; }
  .contact { margin-top: 40px; font-size: .9rem; color: #6b6b70; }
  .contact a { color: inherit; }
  footer { margin-top: 56px; font-size: .8rem; color: #9a9a9e; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1c; color: #eaeaea; }
    .card { background: #242427; border-color: #34343a; }
    .lead, .card p, .contact, footer { color: #a0a0a6; }
